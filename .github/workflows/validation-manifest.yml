name: Validation manifest

"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-validation-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check committed validation status
        run: python3 scripts/check_validation_manifest.py
